{% extends 'usuarios/base.html' %}

{% block conteudo %}

    <div class="container mt-5">
      <h1>Usuarios Cadastrados:</h1>
      <h2 class="text-center mb-4">Listagem de Usuários</h2>

      <!-- table-striped deixa uma linha sim e outra não cinza. table-hover destaca a linha ao passar o mouse -->
      <table class="table table-striped table-hover table-bordered">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Idade</th>
          </tr>
        </thead>
        <tbody>
          {% for usuario in usuarios %}
          <tr>
            <td>{{ usuario.id_usuario }}</td>
            <td>{{ usuario.nome_usuario }}</td>
            <td>{{ usuario.idade_usuario }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

      <!-- text-center centraliza o botão. mt-4 dá um espaço em cima -->
      <div class="text-center mt-4">
        <a href="{% url 'home' %}" class="btn btn-primary">
          Voltar para a Home
          
        </a>
        <br>
          <br>
          <br>
        <br>
      </div>
    </div>
{% endblock %}
